<!DOCTYPE html>
<html>

<head>

    <title>Flood Prediction System</title>

    <link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}">

</head>

<body>

    <div class="container">

        <h1>🌊 Flood Prediction System</h1>

        <p class="subtitle">
            Machine Learning based Flood Risk Prediction using XGBoost
        </p>

        <form action="/predict" method="POST">

            <input type="number" name="feature0" placeholder="Monsoon Intensity" required>

            <input type="number" name="feature1" placeholder="Topography Drainage" required>

            <input type="number" name="feature2" placeholder="River Management" required>

            <input type="number" name="feature3" placeholder="Deforestation" required>

            <input type="number" name="feature4" placeholder="Urbanization" required>

            <input type="number" name="feature5" placeholder="Climate Change" required>

            <input type="number" name="feature6" placeholder="Dams Quality" required>

            <input type="number" name="feature7" placeholder="Siltation" required>

            <input type="number" name="feature8" placeholder="Agricultural Practices" required>

            <input type="number" name="feature9" placeholder="Encroachments" required>

            <input type="number" name="feature10" placeholder="Disaster Preparedness" required>

            <input type="number" name="feature11" placeholder="Drainage Systems" required>

            <input type="number" name="feature12" placeholder="Coastal Vulnerability" required>

            <input type="number" name="feature13" placeholder="Landslides" required>

            <input type="number" name="feature14" placeholder="Watersheds" required>

            <input type="number" name="feature15" placeholder="Infrastructure" required>

            <input type="number" name="feature16" placeholder="Population Score" required>

            <input type="number" name="feature17" placeholder="Wetland Loss" required>

            <input type="number" name="feature18" placeholder="Planning Quality" required>

            <input type="number" name="feature19" placeholder="Political Factors" required>

            <button type="submit">
                Predict Flood Risk
            </button>

        </form>

        <div class="footer">

            Developed using Flask • Scikit-Learn • XGBoost

        </div>

    </div>

</body>

</html>
